{% extends "base.html" %}
{% block content %}
<div class="grid md:grid-cols-3 gap-8">
    
    <div class="md:col-span-2 space-y-6">
        <div class="bg-white p-8 rounded-lg shadow-sm border-t-4 border-blue-600">
            <h1 class="text-3xl font-bold text-gray-800 mb-4">Bienvenidos a nuestra Asociación</h1>
            <p class="text-gray-600">Gestionando el agua de nuestra vereda con responsabilidad.</p>
        </div>
    </div>

    <div id="contacto" class="bg-white p-6 rounded-lg shadow-lg border border-gray-200">
        <h3 class="text-xl font-bold mb-4 text-blue-900 border-b pb-2">Contáctenos</h3>
        
        <form action="/enviar_contacto" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-gray-700">Nombre Completo</label>
                <input type="text" name="nombre" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>
            
            <div>
                <label class="block text-sm font-bold text-gray-700">Correo Electrónico</label>
                <input type="email" name="correo" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" required>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700">Asunto</label>
                <select name="asunto" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none">
                    <option>Reportar Daño</option>
                    <option>Petición/Queja</option>
                    <option>Información General</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700">Mensaje</label>
                <textarea name="mensaje" rows="4" class="w-full border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none" required></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-700 text-white font-bold py-2 rounded hover:bg-blue-800 transition">
                Enviar Reporte
            </button>
        </form>
    </div>

</div>
{% endblock %}
