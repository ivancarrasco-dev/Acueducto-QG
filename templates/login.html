{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-xl mt-10 border border-slate-100">
    <div class="text-center mb-8">
        <i class="fas fa-lock text-4xl text-blue-600 mb-4"></i>
        <h1 class="text-2xl font-black text-slate-900">Acceso Administrativo</h1>
        <p class="text-slate-500 text-sm mt-2">Ingrese sus credenciales para gestionar el acueducto</p>
    </div>

    <form action="/login" method="POST" class="space-y-6">
        <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Usuario</label>
            <input type="text" name="usuario" class="w-full bg-slate-50 border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" required>
        </div>
        
        <div>
            <label class="block text-sm font-bold text-slate-700 mb-2">Contraseña</label>
            <input type="password" name="password" class="w-full bg-slate-50 border-slate-200 p-3 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition" required>
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl shadow-md hover:bg-blue-700 transition">
            Iniciar Sesión
        </button>
    </form>
</div>
{% endblock %}
